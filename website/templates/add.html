{% extends "base.html" %}

{% block title %}Add Book{% endblock %}

{% block content %}
<h2>Add New Book</h2>

<form method="post" class="data-form">

    <div class="form-row">
        <label for="BookID">Book ID:</label>
        <input type="number" id="BookID" name="BookID" required>
    </div>

    <div class="form-row">
        <label for="Title">Title:</label>
        <input type="text" id="Title" name="Title" required>
    </div>

    <div class="form-row">
        <label for="Category">Category:</label>
        <input type="text" id="Category" name="Category">
    </div>

    <div class="form-row">
        <label for="Price">Price:</label>
        <input type="number" step="0.01" id="Price" name="Price">
    </div>

    <div class="form-row">
        <label for="Price_After_Tax">Price After Tax:</label>
        <input type="number" step="0.01" id="Price_After_Tax" name="Price_After_Tax">
    </div>

    <div class="form-row">
        <label for="Tax_amount">Tax Amount:</label>
        <input type="number" step="0.01" id="Tax_amount" name="Tax_amount">
    </div>

    <div class="form-row">
        <label for="Avilability">Availability:</label>
        <input type="text" id="Avilability" name="Avilability">
    </div>

    <div class="form-row">
        <label for="Number_of_reviews">Number of Reviews:</label>
        <input type="number" id="Number_of_reviews" name="Number_of_reviews">
    </div>

    <div class="form-row">
        <label for="Stars">Stars:</label>
        <input type="number" step="1" min="0" max="5" id="Stars" name="Stars">
    </div>

    <button type="submit">Add Book</button>
</form>

{% if message %}
<div class="message">
    {{ message }}
</div>
{% endif %}
{% endblock %}
