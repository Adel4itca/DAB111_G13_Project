{% extends "base.html" %}

{% block title %}Delete Book{% endblock %}

{% block content %}
<h2>Delete Book</h2>

<form method="post" class="data-form">
    <div class="form-row">
        <label for="BookID">Book ID to delete:</label>
        <input type="number" id="BookID" name="BookID" required>
    </div>

    <button type="submit">Delete</button>
</form>

{% if message %}
<div class="message">
    {{ message }}
</div>
{% endif %}

{% endblock %}
